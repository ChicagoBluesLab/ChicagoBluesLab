<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #050505; --card-bg: #121212; --accent: #e50914; --text: #fff; --text-dim: #a7a7a7; }
        body { background: var(--bg-color); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 50px 0; border-bottom: 1px solid #222; margin-bottom: 40px; }
        h1 { color: var(--accent); font-size: 2.8rem; margin: 0; letter-spacing: -2px; }
        
        .music-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 30px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .track-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            transition: 0.4s;
            border: 1px solid transparent;
        }
        .track-card:hover { transform: scale(1.03); background: #1f1f1f; border-color: #333; }
        
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .track-info h3 { margin: 0; font-size: 1.2rem; }
        .track-info p { color: var(--text-dim); margin: 5px 0 20px 0; font-size: 0.9rem; }
        
        audio { width: 100%; height: 35px; filter: invert(1) brightness(1.5); margin-bottom: 15px; }
        
        .btn-download { 
            display: block; text-align: center; padding: 10px; 
            background: #252525; color: #fff; text-decoration: none; 
            border-radius: 6px; font-weight: 500; transition: 0.3s;
        }
        .btn-download:hover { background: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>CHICAGO BLUES LAB</h1>
    <p>Premium Audio Collection</p>
</header>

<div class="music-grid" id="gallery">
    </div>

<script>
    // --- SADECE BURAYI GÜNCELLEYECEKSİN ---
    const songs = [
        { title: "Track One", file: "track1.mp3", cover: "cover.jpg" },
        { title: "Track Two", file: "track2.mp3", cover: "cover2.jpg" },
        { title: "Track Three", file: "track3.mp3", cover: "cover3.jpg" },
        // Buraya istediğin kadar ekle...
    ];
    // --------------------------------------

    const gallery = document.getElementById('gallery');

    songs.forEach(song => {
        const card = `
            <div class="track-card">
                <img src="${song.cover}" class="album-art">
                <div class="track-info">
                    <h3>${song.title}</h3>
                    <p>BornEcho Music</p>
                </div>
                <audio controls><source src="${song.file}" type="audio/mpeg"></audio>
                <a href="${song.file}" download class="btn-download">Download MP3</a>
            </div>
        `;
        gallery.innerHTML += card;
    });
</script>

</body>
</html>
