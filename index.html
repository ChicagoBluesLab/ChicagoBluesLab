<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Digital Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Netflix Tarzı Karanlık Tema */
        :root { 
            --bg-color: #050505; 
            --card-bg: #121212; 
            --accent: #e50914; 
            --text: #ffffff; 
            --text-dim: #a7a7a7; 
        }

        body { 
            background: var(--bg-color); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        header { 
            text-align: center; 
            padding: 60px 0; 
            border-bottom: 1px solid #1a1a1a; 
            margin-bottom: 40px; 
        }

        h1 { 
            color: var(--accent); 
            font-size: 3rem; 
            margin: 0; 
            letter-spacing: -2px; 
            font-weight: 700;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .music-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 35px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        /* Kart Tasarımı */
        .track-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
        }

        .track-card:hover { 
            transform: scale(1.05); 
            background: #1a1a1a; 
            border-color: #333; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .album-art { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 10px; 
            object-fit: cover; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .track-info h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* Çok uzun başlıkları keser */
        }

        .track-info p { 
            color: var(--text-dim); 
            margin: 5px 0 20px 0; 
            font-size: 0.85rem; 
            font-weight: 300;
        }
        
        /* Ses Oynatıcı Stili */
        audio { 
            width: 100%; 
            height: 35px; 
            filter: invert(1) brightness(1.8); 
            margin-bottom: 15px; 
        }
        
        /* İndirme Butonu */
        .btn-download { 
            display: block; 
            text-align: center; 
            padding: 12px; 
            background: #252525; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-download:hover { 
            background: var(--accent); 
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body>

<header>
    <h1>CHICAGO BLUES LAB</h1>
    <p>Official Digital Music Archive & Free Downloads</p>
</header>

<div class="music-grid" id="gallery">
    </div>

<script>
    /* YENİ MÜZİK EKLEME ALANI:
       Her yeni şarkı için aşağıdaki { } bloğunu kopyalayıp virgül koyarak ekle.
       YouTube başlığını "title" kısmına yaz.
    */
    const songs = [
        { 
            title: "Chicago Blues - Deep Night Session (Official Audio)", 
            file: "track1.mp3", 
            cover: "cover.jpg" 
        },
        { 
            title: "Slow Emotional Blues - Midnight Rain", 
            file: "track2.mp3", 
            cover: "cover2.jpg" 
        },
        { 
            title: "Urban Mystery - Dark Soul Blues", 
            file: "track3.mp3", 
            cover: "cover3.jpg" 
        }
    ];

    const gallery = document.getElementById('gallery');

    // Listeyi ekrana basan fonksiyon
    songs.forEach(song => {
        const card = `
            <div class="track-card">
                <img src="${song.cover}" alt="${song.title}" class="album-art">
                <div class="track-info">
                    <h3>${song.title}</h3>
                    <p>BornEcho Music Original</p>
                </div>
                <audio controls>
                    <source src="${song.file}" type="audio/mpeg">
                </audio>
                <a href="${song.file}" download="${song.title}" class="btn-download">Download MP3</a>
            </div>
        `;
        gallery.innerHTML += card;
    });
</script>

</body>
</html>
