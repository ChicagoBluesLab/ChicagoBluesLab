<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Auto-Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #e50914; --text: #fff; --text-dim: #a7a7a7; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 50px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 40px; }
        h1 { color: var(--accent); font-size: 2.5rem; letter-spacing: -2px; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; max-width: 1400px; margin: 0 auto; }
        .track-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; transition: 0.3s; }
        .track-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; margin-bottom: 12px; }
        h3 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }
        p { color: var(--text-dim); font-size: 0.8rem; margin: 5px 0 15px 0; }
        audio { width: 100%; height: 30px; filter: invert(1); margin-bottom: 10px; }
        .btn-download { display: block; text-align: center; padding: 10px; background: #222; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.8rem; transition: 0.2s; border: 1px solid #333; }
        .btn-download:hover { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>CHICAGO BLUES LAB</h1>
    <p>Otomatik Müzik Arşivi</p>
</header>

<div class="music-grid" id="gallery">
    </div>

<script>
    // --- TEK YAPMAN GEREKEN DOSYA ADLARINI BURAYA YAZMAK ---
    // Dosya adını neyse aynısını yaz, uzantısız hali başlık olur.
    const fileNames = [
        "Chicago Blues - Deep Night Session",
        "Midnight Rain Slow Blues",
        "Urban Mystery Dark Soul",
        "Sıradaki Yeni Şarkın"
    ];
    // -------------------------------------------------------

    const gallery = document.getElementById('gallery');

    fileNames.forEach(name => {
        // Dosya isimlerinden temiz başlık oluşturur
        const cleanTitle = name.replace(/-/g, ' ').replace(/_/g, ' ');
        
        const card = `
            <div class="track-card">
                <img src="${name}.jpg" onerror="this.src='cover.jpg'" class="album-art">
                <div class="track-info">
                    <h3>${cleanTitle}</h3>
                    <p>BornEcho Music</p>
                </div>
                <audio controls><source src="${name}.mp3" type="audio/mpeg"></audio>
                <a href="${name}.mp3" download class="btn-download">MP3 İndir</a>
            </div>
        `;
        gallery.innerHTML += card;
    });
</script>

</body>
</html>
