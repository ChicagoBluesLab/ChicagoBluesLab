<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Blues Lab</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.player {
  margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">

<h1>Chicago Blues Lab</h1>

<div class="grid" id="grid"></div>

<div class="player">
  <h2 id="title"></h2>
  <audio controls id="audio"></audio>
</div>

</div>

<script>

// 🔥 SADECE BURAYA ŞARKI EKLEYECEKSİN
const tracks = [
  {
    title: "Midnight Blues Guitar",
    audio: "track1.mp3",
    cover: "cover.jpg"
  }
];

// ---------------------------------

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const title = document.getElementById("title");

tracks.forEach(track => {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${track.cover}">
    <p>${track.title}</p>
  `;

  div.onclick = () => {
    audio.src = track.audio;
    title.innerText = track.title;
    audio.play();
  };

  grid.appendChild(div);
});

</script>

</body>
</html>
