<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Digital Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #e50914; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        header { text-align: center; padding: 60px 20px; border-bottom: 1px solid #1a1a1a; }
        h1 { color: var(--accent); font-size: 3.5rem; letter-spacing: -3px; margin-bottom: 5px; text-transform: uppercase; font-weight: 900; }
        
        .container { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .track-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #1f1f1f; transition: 0.3s; position: relative; }
        .track-card.playing { border-color: var(--accent); box-shadow: 0 0 20px rgba(229, 9, 20, 0.3); }
        
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; margin-bottom: 15px; }
        h3 { margin: 10px 0 5px 0; font-size: 1.1rem; color: #fff; }
        audio { width: 100%; height: 35px; filter: invert(1); margin-bottom: 15px; opacity: 0.8; }
        
        .dl-btn { display: block; text-align: center; background: var(--accent); color: #fff; padding: 12px; text-decoration: none; border-radius: 8px; font-size: 0.85rem; border: none; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .dl-btn:hover { background: #ff0f1b; transform: scale(1.02); }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #000; margin: 15% auto; padding: 40px; border: 1px solid #222; width: 90%; max-width: 400px; border-radius: 25px; text-align: center; }
        
        .modal-content h2 { color: #fff; margin-bottom: 25px; font-weight: 900; letter-spacing: -1px; }

        .support-option { display: block; text-decoration: none; padding: 18px; border-radius: 12px; margin-bottom: 15px; font-weight: 800; transition: 0.3s; font-size: 1.1rem; }
        
        /* NET YOUTUBE DESTEK BUTONU */
        .opt-membership { background: var(--accent); color: #fff; }
        .opt-membership:hover { background: #ff0f1b; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); }
        
        .opt-free { background: transparent; color: #666; border: 1px solid #333; font-weight: 500; font-size: 0.9rem; }
        .opt-free:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>CHICAGO BLUES LAB</h1>
    <p style="color: #444; font-weight: bold; letter-spacing: 2px;">OFFICIAL ARCHIVE</p>
</header>

<div class="container">
    <div class="music-grid" id="gallery"></div>
</div>

<div id="downloadModal" class="modal">
    <div class="modal-content">
        <h2>Download & Support 🎸</h2>
        
        <a href="https://www.youtube.com/@ChicagoBluesLab/membership" target="_blank" class="support-option opt-membership" onclick="closeModal()">
            ⭐ Support on YouTube (Membership)
        </a>

        <a href="#" id="directDownloadLink" class="support-option opt-free" onclick="closeModal()">
            Download for Free
        </a>
    </div>
</div>

<script>
    const songFiles = [
        "Bitter Sweet", "Blue Alley", "Cold Whiskey", "Concrete Jungle",
        "Dark Bourbon", "Deep Velvet", "Gravel Voice", "Lost Highway",
        "Midnight Fuel", "Neon Noir", "Shadow Riff", "Soul Whisper",
        "Chicago Blues Lab – Midnight Blues Guitar _ Relaxing Dark Blues Music-2026"
    ];

    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('downloadModal');
    const directLink = document.getElementById('directDownloadLink');

    songFiles.forEach((name, index) => {
        const displayName = name.replace(/_/g, ' ').replace(/-/g, ' ');
        gallery.innerHTML += `
            <div class="track-card" id="card-${index}">
                <img src="${name}.jpeg" onerror="this.src='${name}.jpg'" class="album-art">
                <h3>${displayName}</h3>
                <span style="font-size: 0.7rem; color: #333; margin-bottom: 15px; display: block; text-transform: uppercase; font-weight: bold;">Original Production</span>
                <audio id="audio-${index}" controls onplay="syncHighlight(${index})" onended="playNext(${index})">
                    <source src="${name}.mp3" type="audio/mpeg">
                </audio>
                <button onclick="openDownloadMenu('${name}.mp3', '${displayName}')" class="dl-btn">Download MP3</button>
            </div>
        `;
    });

    function openDownloadMenu(file, name) {
        directLink.href = file;
        directLink.download = name + ".mp3";
        modal.style.display = "block";
    }

    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(event) { if (event.target == modal) { closeModal(); } }

    function playNext(currentIndex) {
        let nextIndex = currentIndex + 1;
        if (nextIndex >= songFiles.length) nextIndex = 0;
        const nextAudio = document.getElementById(`audio-${nextIndex}`);
        if (nextAudio) { 
            nextAudio.play(); 
            document.getElementById(`card-${nextIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); 
        }
    }

    function syncHighlight(index) {
        document.querySelectorAll('.track-card').forEach(card => card.classList.remove('playing'));
        document.getElementById(`card-${index}`).classList.add('playing');
        document.querySelectorAll('audio').forEach((audio, i) => { if (i !== index) { audio.pause(); audio.currentTime = 0; } });
    }
</script>
</body>
</html>
