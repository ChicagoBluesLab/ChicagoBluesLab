<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Premium Archive</title>
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-light: #e0e0e0;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-red);
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .archive-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .music-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        .music-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-red);
        }

        .music-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-info {
            padding: 15px;
            text-align: center;
        }

        .card-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        /* Modal (İndirme Ekranı) Tasarımı - Mobil Uyumlu */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            border: 2px solid var(--primary-red);
            border-radius: 12px;
            width: 90%;
            max-width: 350px; /* Daha derli toplu durması için küçülttük */
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .btn-join {
            display: block;
            background: var(--primary-red);
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            margin: 15px 0;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download {
            display: block;
            border: 1px solid var(--primary-red);
            color: var(--primary-red);
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: var(--primary-red);
            color: white;
        }

        audio {
            width: 100%;
            margin-top: 15px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Koyu tema uyumu */
        }
    </style>
</head>
<body>

    <h1>Chicago Blues Lab Arşivi</h1>

    <div class="archive-container" id="musicGrid">
        </div>

    <div id="downloadModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--primary-red);"></h2>
            <p>Destek olmak için YouTube kanalımıza katılın!</p>
            <a href="https://www.youtube.com/@ChicagoBluesLab/join" target="_blank" class="btn-join">YOUTUBE'DA KATIL</a>
            <a id="downloadLink" href="#" download class="btn-download">ÜCRETSİZ İNDİR (.MP3)</a>
            <audio id="audioPlayer" controls>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // Müzik listesi - SORROW BURAYA EKLENDİ
        const musicData = [
            {
                title: "Sorrow",
                img: "Sorrow.jpeg",
                file: "Sorrow.mp3"
            },
            {
                title: "Midnight Bourbon Blues",
                img: "midnight.jpg", // Daha önceki görsel adın neyse ona göre düzeltirsin
                file: "midnight.mp3"
            }
        ];

        const grid = document.getElementById('musicGrid');

        musicData.forEach(music => {
            const card = document.createElement('div');
            card.className = 'music-card';
            card.innerHTML = `
                <img src="${music.img}" alt="${music.title}">
                <div class="card-info">
                    <h3>${music.title}</h3>
                </div>
            `;
            card.onclick = () => openModal(music);
            grid.appendChild(card);
        });

        function openModal(music) {
            document.getElementById('modalTitle').innerText = music.title;
            document.getElementById('downloadLink').href = music.file;
            document.getElementById('audioSource').src = music.file;
            const player = document.getElementById('audioPlayer');
            player.load();
            document.getElementById('downloadModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('downloadModal').style.display = 'none';
            document.getElementById('audioPlayer').pause();
        }

        // Dışarı tıklayınca kapansın
        window.onclick = function(event) {
            if (event.target == document.getElementById('downloadModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
