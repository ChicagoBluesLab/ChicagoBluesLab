<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Blues Lab | Digital Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #e50914; --text: #fff; --text-dim: #a7a7a7; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        header { text-align: center; padding: 60px 20px; border-bottom: 1px solid #1a1a1a; background: linear-gradient(to bottom, #0a0a0a, #050505); }
        h1 { color: var(--accent); font-size: 3.5rem; letter-spacing: -3px; margin-bottom: 15px; text-transform: uppercase; font-weight: 900; }
        
        /* VIP MEMBERSHIP BANNER */
        .vip-banner {
            background: linear-gradient(45deg, rgba(20, 20, 20, 0.8), rgba(0, 0, 0, 1));
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            max-width: 650px;
            margin: 20px auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .vip-banner:hover { border-color: var(--accent); }
        .vip-banner p { color: #fff; font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 600; letter-spacing: 0.5px; }
        
        .btn-vip { 
            background: #111; 
            color: #fff; 
            padding: 15px 35px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: 800; 
            display: inline-block;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            border: 1px solid #333;
        }
        .btn-vip:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2); }

        .container { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .track-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #1f1f1f; transition: 0.3s; position: relative; }
        .track-card.playing { border-color: var(--accent); box-shadow: 0 0 20px rgba(229, 9, 20, 0.3); }
        .track-card:hover { border-color: #333; }
        
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; margin-bottom: 15px; }
        h3 { margin: 10px 0 5px 0; font-size: 1.1rem; color: #fff; }
        audio { width: 100%; height: 35px; filter: invert(1); margin-bottom: 15px; opacity: 0.7; transition: 0.3s; }
        audio:hover { opacity: 1; }
        
        /* DIRECT DOWNLOAD BUTTON */
        .dl-btn { display: block; text-align: center; background: var(--accent); color: #fff; padding: 12px; text-decoration: none; border-radius: 8px; font-size: 0.85rem; border: none; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .dl-btn:hover { background: #ff0f1b; transform: scale(1.02); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3); }

        /* SUPPORT NOTE */
        .thanks-note {
            display: block; text-align: center; font-size: 0.7rem; color: #444; margin-top: 10px; font-weight: 500; line-height: 1.4;
        }
        .thanks-note a { color: var(--accent); text-decoration: none; font-weight: 700; transition: 0.3s; }
        .thanks-note a:hover { color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>CHICAGO BLUES LAB</h1>
    
    <div class="vip-banner">
        <p>Support our archive and get exclusive content</p>
        <a href="https://www.youtube.com/@ChicagoBluesLab/membership" target="_blank" class="btn-vip">
            💎 JOIN ON YOUTUBE (MEMBERSHIP)
        </a>
    </div>
</header>

<div class="container">
    <div class="music-grid" id="gallery"></div>
</div>

<script>
    const songFiles = [
        "Bitter Sweet", "Blue Alley", "Cold Whiskey", "Concrete Jungle",
        "Dark Bourbon", "Deep Velvet", "Gravel Voice", "Lost Highway",
        "Midnight Fuel", "Neon Noir", "Shadow Riff", "Soul Whisper",
        "Chicago Blues Lab – Midnight Blues Guitar _ Relaxing Dark Blues Music-2026"
    ];

    const gallery = document.getElementById('gallery');

    songFiles.forEach((name, index) => {
        const displayName = name.replace(/_/g, ' ').replace(/-/g, ' ');
        gallery.innerHTML += `
            <div class="track-card" id="card-${index}">
                <img src="${name}.jpeg" onerror="this.src='${name}.jpg'" class="album-art">
                <h3>${displayName}</h3>
                <span style="font-size: 0.7rem; color: #333; margin-bottom: 15px; display: block; text-transform: uppercase; font-weight: bold;">BornEcho Original</span>
                <audio id="audio-${index}" controls onplay="syncHighlight(${index})" onended="playNext(${index})">
                    <source src="${name}.mp3" type="audio/mpeg">
                </audio>
                
                <a href="${name}.mp3" download="${displayName}.mp3" class="dl-btn">Download MP3</a>
                
                <span class="thanks-note">Enjoy the music! Please <a href="https://www.youtube.com/@ChicagoBluesLab?sub_confirmation=1" target="_blank">Subscribe</a> to support our work.</span>
            </div>
        `;
    });

    function playNext(currentIndex) {
        let nextIndex = currentIndex + 1;
        if (nextIndex >= songFiles.length) nextIndex = 0;
        const nextAudio = document.getElementById(`audio-${nextIndex}`);
        if (nextAudio) { 
            nextAudio.play(); 
            document.getElementById(`card-${nextIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); 
        }
    }

    function syncHighlight(index) {
        document.querySelectorAll('.track-card').forEach(card => card.classList.remove('playing'));
        document.getElementById(`card-${index}`).classList.add('playing');
        document.querySelectorAll('audio').forEach((audio, i) => { if (i !== index) { audio.pause(); audio.currentTime = 0; } });
    }
</script>
</body>
</html>
