<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Blues Lab – Midnight Blues Guitar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background: #000;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('cover.jpg') center center / cover no-repeat;
      filter: blur(30px) brightness(0.25);
      transform: scale(1.12);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.8));
      z-index: -1;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(15, 15, 15, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin-bottom: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.45);
    }

    .artist {
      margin: 0;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #cfcfcf;
    }

    .title {
      margin: 10px 0 10px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .desc {
      margin: 0 0 24px;
      color: #b6b6b6;
      font-size: 15px;
      line-height: 1.5;
    }

    audio {
      width: 100%;
      margin-bottom: 18px;
      border-radius: 999px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      color: #8f8f8f;
    }

    @media (max-width: 520px) {
      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .title {
        font-size: 28px;
      }

      .desc {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="wrap">
    <div class="card">
      <img src="cover.jpg" alt="Midnight Blues Guitar cover" class="cover" />

      <p class="artist">Chicago Blues Lab</p>
      <h1 class="title">Midnight Blues Guitar</h1>
      <p class="desc">Slow emotional blues for late night souls.</p>

      <audio controls preload="metadata">
        <source src="track1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>

      <div class="buttons">
        <a href="track1.mp3" download="track1.mp3" class="btn btn-primary">Download Track</a>
        <a href="https://www.youtube.com/" target="_blank" class="btn btn-secondary">Watch on YouTube</a>
      </div>

      <div class="footer-note">
        Official release page
      </div>
    </div>
  </div>
</body>
</html>
